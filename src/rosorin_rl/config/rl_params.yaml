# ============================================================================
# rl_params.yaml — 강화학습 파이프라인의 모든 튜너블(조정 가능한) 파라미터
#
# 설계 출처(단일 출처):
#   - 상태 공간:   docs/rl_design/rl_state_space.md
#   - 보상/종료:   docs/rl_design/rl_reward_function.md
#   - 시나리오:    docs/rl_design/rl_train_scenarios.md
# 각 값의 의미와 "언제 어떻게 조정하는지"는 docs/rl_code_guide.md 참조.
# ============================================================================

# ---------------------------------------------------------------------------
# 행동 공간 스케일링 (proposal §5.2)
# 에이전트 출력 [-1,1]을 실제 물리 속도로 변환하는 최대치.
# ---------------------------------------------------------------------------
action:
  v_max: 0.5        # [m/s]  전후(vx)·좌우(vy) 최대 선속도
  w_max: 1.0        # [rad/s] 최대 회전 각속도

# ---------------------------------------------------------------------------
# 제어 루프
# ---------------------------------------------------------------------------
control:
  rate_hz: 10.0     # [Hz] step() 주기. LiDAR 발행 주기(10Hz)와 일치시킴.
                    #      한 step = cmd_vel 발행 → 0.1초(sim time) 대기 → 관측.
  step_timeout_sec: 5.0   # [s] sim time이 멈췄을 때를 대비한 wall-time 안전 타임아웃

# ---------------------------------------------------------------------------
# 에피소드 구조 (종료 조건·터미널 보상의 단일 출처: rl_reward_function.md §5)
# ---------------------------------------------------------------------------
episode:
  max_steps: 1500           # 이 스텝 수까지 생존하면 '성공' (10Hz × 150초)
                            # [7차] 1200→1500: speed 0.1 기준 통로 왕복(입구→끝→입구)
                            # ≈1110스텝 + 여유 35% → 성공 = 왕복 완주
  target_lost_frames: 15    # 타겟이 연속 몇 스텝 미검출이면 '타겟 이탈'로 종료할지
  stuck_window: 100         # 정체 감지: 최근 N스텝 보상 평균을 검사
  warmup_steps: 20          # 에피소드 시작 직후 이 스텝 동안은 정체/이탈 판정 유예
                            # (리셋 직후 센서 안정화 전에 잘못 종료되는 것 방지)
  collision_warmup: 3       # 충돌 판정 유예는 더 짧게 — 리셋 직후 stale 프레임 방어용.
                            # (20스텝이면 시작 직후 문에 박는 0.7초가 마스킹돼 버림)

# ---------------------------------------------------------------------------
# 타겟(작업자) 관련
# ---------------------------------------------------------------------------
target:
  opt_distance: 0.65        # [m] 최적 추종 거리 d_opt (rl_reward_function.md §3.1)
  collision_distance: 0.4   # [m] 이보다 가까우면 '타겟 충돌' 종료 (-100)
  lost_distance: 3.0        # [m] 이보다 멀어지면 '타겟 이탈' 종료 (-50)
  speed: 0.1                # [m/s] 작업자 보행 속도 — 커리큘럼 1단계 (7차: 0.05→0.1)
                            #   sac_2(0.05) 수렴 확인 후 인상. 최종 목표 0.25 (시나리오 1
                            #   명목치). ⚠️ launch/rl_sim.launch.py 의 speed 리터럴과
                            #   반드시 함께 변경할 것 (이중 소스 — 노드는 yaml 미참조)
  scenario: 1               # 학습 시나리오 번호 (현재 1=정속 주행만 구현)
  # 리셋 시 타겟 시작 위치 — 통로 입구(잎 시작점 x=0.60), 통로 중심선 y=0
  reset_x: 0.6              # [m]
  reset_y: 0.0              # [m]
  # 통로에서 타겟이 왕복하는 x 구간 (gen_greenhouse_world.py 레이아웃 기준)
  aisle_x_min: 0.9          # [m]
  aisle_x_max: 6.3          # [m]

# ---------------------------------------------------------------------------
# 로봇 리셋 위치
# ---------------------------------------------------------------------------
robot:
  reset_x: -0.40            # 입구 문(서쪽 벽 x=-0.90, 문짝 visual 면 ≈ -0.805) 앞.
                            # 풋프린트 충돌 판정 기준 후방 시작 마진 ~0.10~0.15m 확보 위치.
                            # (-0.45는 LiDAR 노이즈 하위꼬리에서 margin 0.056까지 내려가
                            #  임계 0.05와 6mm 차 — 오발화 위험으로 5cm 추가 전진, 실측)
  reset_y: 0.0
  reset_y_jitter: 0.05      # [m] [7차] 시작 횡오프셋 무작위화 폭 (±). 고정 스폰이
                            #   만든 우편향 궤적 고착을 깨고 능동 중앙 보정을 강제.
                            #   ⚠️ 0.06 초과 금지: 통로 중앙 raw 0.38m, 측면 안전 임계
                            #   0.32m → ±6cm 가 무벌점 한계. 0이면 비활성(기존 동작).
  reset_z: 0.05             # 바닥에 살짝 띄워 스폰 (떨어지며 안착)
  reset_yaw: 0.0            # 통로(+x) 방향
  # 풋프린트 (LiDAR 원점 기준 외곽 거리 [m]) — 충돌 판정(env_margin)에 사용.
  # 로봇은 직사각형이라 방향별로 외곽 거리가 다름. 검증 단계에서 실측 캘리브레이션값.
  footprint:
    front: 0.23             # 전방 외곽 (LiDAR 가 몸체 중심보다 2.1cm 앞에 있어 rear 보다 작음)
    rear: 0.27              # 후방 외곽
    half_width: 0.19        # 좌우 외곽 (외륜 가장자리)

# ---------------------------------------------------------------------------
# 안전/충돌 임계값 (rl_reward_function.md §3.2, 환경 충돌은 거리 프록시)
# ---------------------------------------------------------------------------
# [5차 조정] front/side 는 LiDAR 'raw 거리' 기준임을 1차 학습 진단에서 확인.
#   풋프린트(반폭 0.19, 전방 0.23) + collision_margin(0.05) 때문에 측면 충돌 종료는
#   raw ≈ 0.24m, 전방은 raw ≈ 0.28m 에서 일어난다. 기존 side=0.05 는 도달 불가능
#   (충돌이 먼저 발생), front=0.3 은 gradient 구간이 2cm 뿐이라 r_safety 가 학습
#   내내 0 이었음 (sac_1 TB 실측). 충돌 전 실제로 발동하도록 상향.
thresholds:
  front: 0.45           # [m] 전방 안전 임계 (raw). 정상 추종 시 전방 raw ≈ 0.5m(타겟
                        #     원기둥)이라 무벌점, 그보다 침범하면 경사 시작 (5차 실측 보정)
  side: 0.32            # [m] 측면 안전 임계 (raw). 통로 중앙선 raw ≈ 0.38m 실측(좌+우
                        #     =0.758m) — 중앙 ±6cm 는 무벌점, 그 밖에서 충돌점(0.24m)
                        #     까지 8cm 경사 형성 (5차 실측 보정, sac_1 eval CSV)
  aisle_mode: 1.5       # [m] min(좌,우) 거리가 이보다 크면 '교차로 모드' (w3=0)
  aisle_ramp: 0.5       # [m] [5차] w3 활성 선형 램프 폭: d_side가 1.5→1.0m 로 줄어드는
                        #     동안 0→1. 입구에서 자세 보상이 불연속으로 켜지는 것 방지
                        #     [7차] 이 램프는 yaw 정렬 항에만 적용 (중앙 항은 아래 게이트)
  center_gate: 1.0      # [m] [7차] 중앙유지(ζ) 항 활성: max(좌,우)=먼 쪽 벽이 이 값
                        #     미만일 때만 — 양쪽 벽이 모두 가까운 '진짜 통로 내부' 한정.
                        #     입구는 한쪽만 트여(d_side_max≈2~3m) 게이트 0 → 진입 순간
                        #     |Δ좌우| 포화(캡 1.0)로 생기던 -w3·ζ·1.0/step 관문 제거
  center_gate_ramp: 0.5 # [m] [7차] 중앙유지 선형 램프 폭: d_side_max 1.0→0.5m 동안 0→1
  collision_margin: 0.05  # [m] 로봇 '외곽' 기준 장애물 여유(env_margin)가 이 미만이면
                          #     '환경 충돌' 종료. (3차 수정: 단일 반경 d_collision 방식은
                          #     직사각형 로봇의 전/후면 접촉을 감지 못 하는 버그가 있어
                          #     robot.footprint 기반 방향별 마진 판정으로 교체)

# ---------------------------------------------------------------------------
# 관측(상태) 전처리 (rl_state_space.md §2)
# ---------------------------------------------------------------------------
obs:
  lidar_max_range: 12.0     # [m] NaN/Inf를 이 값으로 치환 (센서 max range)
  sector_percentile: 5      # [%] 구역별 최솟값 대신 하위 N퍼센타일 사용 (외란 노이즈 무시)
  ema_alpha: 0.4            # 지수이동평균 계수 (1=평활화 없음, 작을수록 부드럽지만 반응 느림)
  depth_max_range: 10.0     # [m] 뎁스 카메라 클리핑 한계
  frame_stack: 3            # 프레임 스택 수 (16D × 3 = 48D)
  # 가상 뎁스 범퍼 ROI: 보수적 단순화로 화면 하반(v > cy=200)을 사용
  # (rl_state_space.md §2.5 — LiDAR 평면보다 항상 아래만 포함되어 안전 측)
  depth_roi_v_start: 200    # [px] ROI 시작 행 (이 행 아래만 사용. 640x400에서 cy=200)
  # 바닥 차감(floor subtraction): 하반 ROI 에 항상 보이는 바닥을 장애물로 오인하지
  # 않도록, 행별 기대 바닥 깊이의 floor_margin 배보다 가까운 픽셀만 장애물로 취급
  cam_height: 0.168         # [m] 카메라 광학중심 높이 (ascamera_scaled.xacro 마운트)
  floor_margin: 0.9         # 바닥 깊이 대비 여유 계수 (작을수록 바닥 오인 적고 둔감)

# ---------------------------------------------------------------------------
# 타겟 특징 노드의 도메인 랜덤화 (proposal §4.4)
# ---------------------------------------------------------------------------
noise:
  target_pct: 0.03          # 타겟 특징(d_t 등)에 곱해지는 가우시안 노이즈 표준편차 (3%)
                            # Sim-to-Real 강건성 평가 시 0.3까지 올려 실험 (proposal §6.3)

# ---------------------------------------------------------------------------
# 보상 가중치·계수 (rl_reward_function.md — 수식은 문서, 수치는 여기가 출발점)
# ⚠️ 모두 튜너블. 스케일 균형 근거는 docs/rl_code_guide.md "튜닝 표" 참조.
# ---------------------------------------------------------------------------
# [2차 조정] 14k 스텝 학습 정체 진단(ep_len~50 고정 = lost 반복) 후 "추적 강화 /
# 벽 페널티 완화 / 사람 충돌 페널티 유지" 방향으로 재균형 (docs/rl_code_guide.md §3).
reward:
  w1: 2.0       # R_tracking 가중치 ↑(1.0→2.0) — 추적이 지배적 신호가 되도록
  w2: 0.5       # R_safety 가중치 ↓(1.0→0.5) — "통로 진입 = 위험"이라는 회피 학습 완화
  w3: 0.5       # R_pose_center 가중치 (통로 내부 모드에서만 활성)
  alpha: 5.0    # 추종 가우시안 민감도 ↑(1.5→3.0 4차, 3.0→5.0 6차): α=1.5는 d=1.4m
                #   에서도 0.43 을 줘 "입구 배회"가 국소최적이 됨(TB 실측). α=3.0 도
                #   d=1.0m 배회에 +0.69(×w1=1.38/step)를 줘 통로 안(+2.0)과 차이가
                #   0.62 뿐이었음 — sac_1 eval 에서 입구 진입에 평균 11초 배회 실측.
                #   α=5.0 은 배회 보상을 1.08 로 압착(차이 0.92). 원거리 기울기는
                #   k_approach 가 담당하므로 신호 소실 없음. 0.65 근처 출렁이면 α↓.
  beta_f: 30.0  # 전방 페널티 계수: 충돌점(raw 0.28m)에서 -30*(0.45-0.28)^2 ≈ -0.87/step
                #   (×w2=0.5 → -0.43). 정상 추종(raw≈0.5m)에선 0 (5차 임계 보정 기준)
  beta_s: 80.0  # 측면 페널티 계수: 충돌점(raw 0.24m)에서 -80*(0.32-0.24)^2 ≈ -0.51/step
                #   (×w2=0.5 → -0.26). 통로 중앙(raw≈0.38m)에선 0 (5차 임계 보정 기준)
  gamma: 0.5    # 헤딩 정렬 페널티: 0.5rad(≈29°) 틀어지면 -0.25/step
  zeta: 1.0     # 통로 중앙 유지 페널티 ↑(0.5→1.0, 7차): sac_2 eval 에서 통로 내
                #   우편향 주행 관찰 — 10cm 치우침 비용이 0.05/step(×w3)뿐이라
                #   r_track(2.0/step) 대비 무시 가능했음. 입구 관문(center_gate)
                #   제거로 강화가 안전해짐. 편향 잔존 시 1.5 검토.
                #   (0.2m 불균형 시 -0.2/step, ×w3=0.5 → -0.1/step)
  k_approach: 5.0  # [2차] 접근 shaping k·(d_prev − d_t): 거리와 무관하게 "가까워지는
                   # 방향"에 즉각 신호. potential-based 라 최적 정책을 바꾸지 않음.
                   # 0.5m/s 접근 시 +0.25/step, 멀어지면 동일 크기 음수.
  k_smooth: 0.05   # [5차] 행동 변화 페널티 −k·‖a_t−a_{t−1}‖²: 잔떨림(스텝마다 행동
                   # 반전)에 비용 부여. 전형적 떨림(Δ≈0.3/축)에 -0.013/step, 최악
                   # (3축 풀반전)에 -0.6/step — r_track(+2/step)을 지배하지 않는 수준.
  eta: 0.3         # [6차] 타겟 주시 페널티 −η·|θ_t| (visible 시): lost 절벽(FOV 이탈
                   # 15프레임 → -50)의 dense 선행 신호. 화면 중앙이면 0, FOV 가장자리
                   # (±30°≈0.52rad)에서 -0.16/step. "고개 휙 돌림" 억제 → 주시 ω 만 사용.

# 종료(터미널) 보상 — 1회성 스칼라 (rl_reward_function.md §5)
terminal:
  success: 100.0            # max_steps 생존
  env_collision: -30.0      # 작물 벽/구조물 충돌 ↓(-100→-30) — 잎벽은 soft, 과도한
                            #   진입 공포 방지 (2차 조정)
  target_collision: -100.0  # 작업자에 0.4m 미만 근접 — 사람 안전, 매우 크게 유지
  lost: -50.0               # 타겟 이탈(거리 초과 또는 시야 상실)
  stuck: -50.0              # 정체(꼼수) 감지

# ---------------------------------------------------------------------------
# SB3 학습 하이퍼파라미터
# ---------------------------------------------------------------------------
sac:
  learning_rate: 0.0003
  buffer_size: 300000
  batch_size: 256
  gamma: 0.99           # 할인율 (보상의 미래 가치)
  tau: 0.005            # 타겟 네트워크 soft update 계수
  learning_starts: 1000 # 이 스텝까지는 랜덤 행동으로 버퍼만 채움
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto        # 엔트로피 계수 자동 조정 (SAC 핵심)
  net_arch: [256, 256]  # 정책/가치 신경망 은닉층 크기

ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  net_arch: [256, 256]
